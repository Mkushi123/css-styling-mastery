<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
      /* Element selector - inastyle paragraphs ZOTE */
      p {
        color: #333;
      }

      /* Class selector */
      .highlight {
        background: yellow;
      }

      /* ID selector */
      #main-title {
        font-size: 48px;
      }
    </style>
  </head>
  <body>
    <h1 id="main-title">CSS Selectors</h1>

    <!-- Paragraph ya kawaida - inastyliwa na element selector -->
    <p>I am a plain paragraph styled by the element selector.</p>

    <!-- Paragraph yenye class -->
    <p class="highlight">I have a class called highlight.</p>

    <!-- Paragraph yenye ID -->
    <p id="main-title">I have an ID called main-title.</p>

  </body>
</html>
