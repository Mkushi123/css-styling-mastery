<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Styling</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        padding: 24px;
        color: #333;
      }

      h2 {
        color: #8b5cf6;
        margin: 24px 0 12px;
      }

      /* Responsive image */
      .responsive-img {
        width: 100%;
        max-width: 600px;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      /* Rounded image */
      .rounded-img {
        width: 200px;
        height: 200px;
        border-radius: 16px;
        object-fit: cover;
      }

      /* Circle image */
      .circle-img {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Image with border */
      .bordered-img {
        width: 200px;
        height: 200px;
        border: 4px solid #8b5cf6;
        object-fit: cover;
      }

      /* Image with shadow */
      .shadow-img {
        width: 200px;
        height: 200px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        object-fit: cover;
      }

      .image-row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 24px;
      }

      /* Hover effect */
      .hover-img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        transition: transform 0.3s;
      }

      .hover-img:hover {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>

    <h1>Image Styling</h1>

    <h2>Responsive Image</h2>
    <img class="responsive-img" src="https://picsum.photos/600/300" alt="Responsive image">

    <h2>Rounded, Circle & Bordered</h2>
    <div class="image-row">
      <img class="rounded-img" src="https://picsum.photos/200" alt="Rounded image">
      <img class="circle-img" src="https://picsum.photos/201" alt="Circle image">
      <img class="bordered-img" src="https://picsum.photos/202" alt="Bordered image">
    </div>

    <h2>Shadow & Hover Effect</h2>
    <div class="image-row">
      <img class="shadow-img" src="https://picsum.photos/203" alt="Shadow image">
      <img class="hover-img" src="https://picsum.photos/204" alt="Hover image">
    </div>

  </body>
</html>
