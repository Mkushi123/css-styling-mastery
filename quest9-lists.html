<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Lists</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        padding: 24px;
        color: #333;
      }

      h2 {
        color: #8b5cf6;
        margin: 24px 0 12px;
      }

      /* Unordered list styled */
      .styled-ul {
        list-style: none;
        padding: 0;
      }

      .styled-ul li {
        padding: 12px 16px;
        margin-bottom: 8px;
        background: #f0f0ff;
        border-left: 4px solid #8b5cf6;
        border-radius: 4px;
      }

      .styled-ul li:hover {
        background: #e0e0ff;
      }

      /* Ordered list styled */
      .styled-ol {
        list-style: none;
        padding: 0;
        counter-reset: my-counter;
      }

      .styled-ol li {
        counter-increment: my-counter;
        padding: 12px 16px;
        margin-bottom: 8px;
        background: #f0f0ff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .styled-ol li::before {
        content: counter(my-counter);
        background: #8b5cf6;
        color: white;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
      }

      /* Nav list */
      .nav-list {
        list-style: none;
        display: flex;
        gap: 8px;
        padding: 0;
      }

      .nav-list li a {
        text-decoration: none;
        color: white;
        background: #8b5cf6;
        padding: 8px 16px;
        border-radius: 8px;
        display: block;
      }

      .nav-list li a:hover {
        background: #7c3aed;
      }
    </style>
  </head>
  <body>

    <h1>Styled Lists</h1>

    <h2>Unordered List</h2>
    <ul class="styled-ul">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
      <li>React</li>
    </ul>

    <h2>Ordered List</h2>
    <ol class="styled-ol">
      <li>Boil water</li>
      <li>Add coffee powder</li>
      <li>Pour hot water</li>
      <li>Add sugar and milk</li>
      <li>Stir and enjoy</li>
    </ol>

    <h2>Navigation List</h2>
    <ul class="nav-list">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

  </body>
</html>
