<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        color: #333;
      }

      h2 {
        text-align: center;
        padding: 24px 0 12px;
        color: #8b5cf6;
      }

      .box {
        background: #8b5cf6;
        color: white;
        padding: 20px;
        border-radius: 8px;
        font-size: 18px;
        text-align: center;
        width: 100px;
      }

      /* Row ya kawaida */
      .container {
        display: flex;
        gap: 16px;
        padding: 16px;
        background: #f0f0ff;
        border-radius: 8px;
        margin: 0 20px 24px;
      }

      /* Center */
      .container-center {
        display: flex;
        justify-content: center;
        gap: 16px;
        padding: 16px;
        background: #f0f0ff;
        border-radius: 8px;
        margin: 0 20px 24px;
      }

      /* Space between */
      .container-between {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 16px;
        background: #f0f0ff;
        border-radius: 8px;
        margin: 0 20px 24px;
      }

      /* Space around */
      .container-around {
        display: flex;
        justify-content: space-around;
        padding: 16px;
        background: #f0f0ff;
        border-radius: 8px;
        margin: 0 20px 24px;
      }

      /* Column */
      .container-column {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
        background: #f0f0ff;
        border-radius: 8px;
        margin: 0 20px 24px;
        align-items: center;
      }

      /* Center anything on screen */
      .centered {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 200px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0 20px 24px;
        border-radius: 8px;
        color: white;
        font-size: 24px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>

    <h2>Row (default)</h2>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h2>justify-content: center</h2>
    <div class="container-center">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h2>justify-content: space-between</h2>
    <div class="container-between">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h2>justify-content: space-around</h2>
    <div class="container-around">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h2>flex-direction: column</h2>
    <div class="container-column">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>

    <h2>Center Anything on Screen</h2>
    <div class="centered">
      I am perfectly centered!
    </div>

  </body>
</html>
