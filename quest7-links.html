<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 32px;
        background: #1a1a2e;
      }

      .logo {
        color: white;
        font-size: 24px;
        font-weight: 700;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 24px;
      }

      .nav-links a {
        color: white;
        text-decoration: none;
      }

      .nav-links a:hover {
        color: #8b5cf6;
      }

      /* Hero section chini ya navbar */
      .hero {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
        flex-direction: column;
        gap: 16px;
      }

      .hero h1 {
        font-size: 48px;
      }

      .hero p {
        font-size: 18px;
      }

      .btn {
        background: white;
        color: #8b5cf6;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
        margin-top: 8px;
      }

      .btn:hover {
        background: #f0f0ff;
      }
    </style>
  </head>
  <body>

    <nav class="navbar">
      <div class="logo">MySite</div>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="hero">
      <h1>Welcome to MySite</h1>
      <p>Built with HTML and CSS only!</p>
      <button class="btn">Get Started</button>
    </div>

  </body>
</html>
