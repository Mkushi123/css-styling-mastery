<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
      * {
        box-sizing: border-box;
      }

      .my-box {
        padding: 20px;
        border: 3px solid #8b5cf6;
        margin: 16px;
        background: #f0f0ff;
      }
    </style>
  </head>
  <body>
    <h1>The Box Model</h1>

    <div class="my-box">
      <p>I am the <strong>content</strong> inside the box.</p>
      <p>Around me is <strong>padding</strong>, then a <strong>border</strong>, then <strong>margin</strong> outside!</p>
    </div>

  </body>
</html>
